<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=2.0">
    <link rel="stylesheet" href="style.css">
    <title>To Do App</title>
</head>

<body>
    <div class="container">
        <div class="to-do-app">
            <h1>To-Do List  <img class="notebook-img" src="images/icon.png" alt="notebook and pen">
            </h1>
            <div class="add-tasks">
                <input type="text" placeholder="Add your task">
                <button type="submit">Add</button>
            </div>
            <div class="tasks-container">
                <img src="images/unchecked.png" alt="uncheck icon image">
                <div>
                    <p>Create a Javascript project</p>
                    <span>x</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=2.0">
    <link rel="stylesheet" href="style.css">
    <title>To Do App</title>
</head>

<body>
    <div class="container">
        <div class="to-do-app">
            <h1>To-Do List  <img class="notebook-img" src="images/icon.png" alt="notebook and pen">
            </h1>
            <div class="add-tasks">
                <input type="text" id="input-box" placeholder="Add your task">
                <button id="add-button" type="submit" onclick="addTask()">Add</button>
            </div>
            <ul class="tasks-container" id="list-container">
           
                </div>
            </ul>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>

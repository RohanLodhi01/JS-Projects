<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/caf8fafb05.js" crossorigin="anonymous"></script>
    <title>Password Generator</title>
</head>

<body>
    <div class="password-generator">
        <h1>Password Generator</h1>
        <div class="inputBox">
            <input type="text" id="password" readonly>
            <span class="copyBtn" id="copyIcon"><i class="fa-regular fa-copy"></i></span>
        </div>
        <input class="slider" id="lengthSlider" type="range" min="6" max="30" value="6">
        <ul class="password-modify">
            <li>
                <span>Password Length</span>
                <span id="lengthValue"></span>
            </li>
            <li>
                <label for="lowercase">Include Lowercase Letters (a-z)</label>
                <input type="checkbox" id="lowercase" checked>
            </li>
            <li>
                <label for="uppercase">Include Uppercase Letters (A-Z)</label>
                <input type="checkbox" id="uppercase" checked>
            </li>
            <li>
                <label for="numbers">Include Numbers (0-9)</label>
                <input type="checkbox" id="numbers" checked>
            </li>
            <li>
                <label for="symbols">Include Symbols (@-*)</label>
                <input type="checkbox" id="symbols" checked>
            </li>
        </ul>

        <button class="genBtn" id="generate" type="button">Generate Password</button>

    </div>
    <script src="script.js"></script>
</body>

</html>

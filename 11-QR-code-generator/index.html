<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>QR Code Generator | Website</title>
</head>

<body>
    <main>
        <div class="container">
            <div class="qr-heading">
                <h1 class="qr-label">Generate qr code</h1>
            </div>

            <input class="qr-text" type="text" placeholder="Type your text OR URL">

            <div class="qr-size">
                <span class="select-size">Select Size:</span>
                <select class="size" id="sizes">
                    <option value="100">100x100</option>
                    <option value="200">200x200</option>
                    <option value="300">300x300</option>
                    <option value="400">400x400</option>
                    <option value="500">500x500</option>
                    <option value="600">600x600</option>
                    <option value="700">700x700</option>
                    <option value="800">800x800</option>
                    <option value="1000">1000x1000</option>
                </select>
            </div>

            <div class="qr-body"></div>

            <div class="qr-buttons">
                <button type="submit">Generate</button>
                <button type="button">Download</button>
            </div>

        </div>
    </main>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/caf8fafb05.js" crossorigin="anonymous"></script>
    <title>Password Generator | Website</title>

</head>

<body>
    <div class="container">
        <h1 class="heading">
            Generate a <span class="heading-label">Random Password</span>
        </h1>
        <div class="pass-field">
            <input type="text"  id="passField"  placeholder="Generate password">
            <i class="fa-solid fa-copy" id="copyBtn"></i>
        </div>

        <button class="gen-btn" onclick="generatePassword()" type="submit">
            <span class="bolt-icon">
                <i class="fa-solid fa-bolt"></i>
            </span>
            Generate Password
        </button>
    </div>

    <!-- 
    scipt.js file link
     -->
    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Notes App | Website</title>
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="/images/notes.png" alt="notes image">
            <h1 class="main-text">Notes</h1>
        </div>

        <button class="create-note"> <img src="images/edit.png" alt="edit icon">Create Notes</button>

        <div class="notes-content">
            <div contenteditable="true" class="input-box">
            </div>
            <img src="/images/delete.png" alt="delete icon">
        </div>
    </div>
    <script src="script.js" defer></script>
</body>

</html>
